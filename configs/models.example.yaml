# Copy to configs/models.yaml (which is gitignored) and customize.
models:
  qwen2_5_7b_instruct:
    provider: huggingface
    model_id: Qwen/Qwen2.5-7B-Instruct
    dtype: float16
    device_map: auto
    max_new_tokens: 256
    temperature: 0.0
    top_p: 1.0

